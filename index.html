<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Artur Kutman | ArtNewMcpe11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root{
      --page-bg-1:#3a3a3a;
      --page-bg-2:#171717;
      --card-bg:#050505;
      --card-accent:#0b0b0b;
      --muted:#b7b7b7;
      --text:#fff;
      --links-width:540px;
      --avatar-size:110px;
      --name-font:20px;
      --desc-font:13px;
      --link-height:60px;
      --icon-circle:44px;
      --gap-links:18px;
      --radius:999px;
      /* УВЕЛИЧИЛИ ВРЕМЯ АНИМАЦИЙ ДЛЯ ПЛАВНОСТИ */
      --t-fast: 200ms;
      --t-mid: 400ms;
      --t-slow: 600ms;
      --easing: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, var(--page-bg-1), var(--page-bg-2), #2a0a4a);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:48px 20px;
      min-height:100vh;
      position:relative;
      overflow:hidden;
    }

    /* Улучшенный градиентный фон */
    .gradient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    /* canvas для улучшенных частиц */
    canvas#particles{
      position: absolute;
      inset: 0;
      width:100%;
      height:100%;
      z-index: 1;
      pointer-events: none;
      display:block;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:flex;
      flex-direction:column;
      align-items:center;
      flex:1;
      position: relative;
      z-index: 2;
    }

    .avatar{
      width:var(--avatar-size);
      height:var(--avatar-size);
      border-radius:50%;
      object-fit:cover;
      border:3px solid rgba(255,255,255,0.1);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.6),
        0 0 30px rgba(120, 119, 198, 0.3);
      transition: all var(--t-mid) var(--easing);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border-radius: 50%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity var(--t-mid) var(--easing);
    }

    .avatar:hover{
      transform: scale(1.05);
      box-shadow:
        0 15px 40px rgba(0,0,0,0.8),
        0 0 40px rgba(120, 119, 198, 0.5);
    }

    .avatar:hover::after {
      opacity: 1;
    }

    h1{
      margin:14px 0 6px;
      font-size:var(--name-font);
      font-weight:700;
      letter-spacing:0.2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    p.desc{
      margin:0;
      margin-bottom:22px;
      font-size:var(--desc-font);
      color:var(--muted);
      max-width:820px;
      text-align:center;
      line-height:1.4;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }

    .links-wrap{ width:100%; display:flex; justify-content:center; }
    .links{
      width:100%;
      max-width:var(--links-width);
      display:flex;
      flex-direction:column;
      gap:var(--gap-links);
      padding:8px 6px 18px;
    }

    /* улучшенные кнопки с более плавными анимациями */
    .link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      height:var(--link-height);
      background: var(--card-bg);
      border-radius:var(--radius);
      padding:0 18px 0 12px;
      text-decoration:none;
      color:var(--text);
      box-shadow:
        0 6px 18px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.05);
      position:relative;
      overflow:hidden;
      border: 1px solid transparent;
      background: linear-gradient(135deg, var(--card-bg), var(--card-accent));

      /* более мягкое появление изначально */
      opacity:0;
      transform: translateY(10px);
      animation: linkIn var(--t-slow) var(--easing) forwards;
      transition: all var(--t-mid) var(--easing);
    }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left var(--t-slow) var(--easing);
    }

    @keyframes linkIn{
      0% { opacity:0; transform: translateY(15px); }
      100% { opacity:1; transform: translateY(0); }
    }

    /* тайминги появления для каждого элемента */
    .link:nth-child(1){ animation-delay:.15s }
    .link:nth-child(2){ animation-delay:.30s }
    .link:nth-child(3){ animation-delay:.45s }
    .link:nth-child(4){ animation-delay:.60s }
    .link:nth-child(5){ animation-delay:.75s }
    .link:nth-child(6){ animation-delay:.90s }
    .link:nth-child(7){ animation-delay:1.05s }
    .link:nth-child(8){ animation-delay:1.20s }

    /* слева: иконка в кружке + текст, аккуратное выравнивание */
    .left{ display:flex; align-items:center; gap:14px; min-width:0; }

    .icon-circle{
      width:var(--icon-circle);
      height:var(--icon-circle);
      border-radius:50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 6px;
      box-shadow:
        inset 0 -6px 18px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05);
      transition: all var(--t-mid) var(--easing);
      will-change: transform;
      position: relative;
      overflow: hidden;
    }

    .icon-circle::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(120,119,198,0.1), rgba(255,119,198,0.1));
      opacity: 0;
      transition: opacity var(--t-mid) var(--easing);
    }

    .icon-circle svg{
      width:20px;
      height:20px;
      display:block;
      color:var(--text);
      transition: all var(--t-mid) var(--easing);
      position: relative;
      z-index: 1;
    }

    .text{
      font-size:15px;
      text-align:center;
      width:100%;
      display:block;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      transition: all var(--t-mid) var(--easing);
      will-change: transform;
      font-weight: 500;
    }

    .arrow{
      width:36px;
      height:36px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.03);
      flex-shrink:0;
      transition: all var(--t-mid) var(--easing);
      will-change: transform;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .arrow svg{ width:14px; height:14px; color:var(--muted); transition: all var(--t-mid) var(--easing); }

    /* Улучшенные hover-эффекты - БОЛЕЕ ПЛАВНЫЕ */
    .link:hover{
      transform: translateY(-4px);
      background: linear-gradient(135deg, var(--card-accent), #151525);
      box-shadow:
        0 20px 46px rgba(0,0,0,0.65),
        0 0 30px rgba(120, 119, 198, 0.2),
        0 0 0 1px rgba(120, 119, 198, 0.1);
    }

    .link:hover::before {
      left: 100%;
    }

    .link:active{ transform: translateY(-2px) scale(0.998); }

    .link:hover .icon-circle{
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        inset 0 -8px 22px rgba(0,0,0,0.55),
        0 5px 15px rgba(0,0,0,0.3);
    }

    .link:hover .icon-circle::before {
      opacity: 1;
    }

    .link:hover .icon-circle svg{
      transform: translateY(-1px) scale(1.1);
    }

    .link:hover .text{
      transform: translateY(-1px);
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .link:hover .arrow{
      transform: translateX(8px);
      background: rgba(120, 119, 198, 0.1);
      box-shadow: 0 0 0 1px rgba(120, 119, 198, 0.2);
    }

    .link:hover .arrow svg{
      transform: translateX(2px);
      color:#fff;
    }

    /* УЛУЧШЕННЫЙ Tooltip "Скоро..." */
    .tooltip{
      position:absolute;
      top:50%;
      left:calc(100% + 12px);
      transform:translateY(-50%) scale(0.9);
      background: rgba(20, 20, 30, 0.95);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-size:13px;
      white-space:nowrap;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.8),
        0 0 20px rgba(120, 119, 198, 0.3);
      opacity:0;
      pointer-events:none;
      transition: all var(--t-mid) var(--easing);
      z-index:40;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 500;
    }
    .tooltip.show{
      opacity:1;
      transform:translateY(-50%) scale(1);
      pointer-events:auto;
    }
    .tooltip.left{ left:auto; right:calc(100% + 12px); }

    /* для пользователей, которые отключили анимации */
    @media (prefers-reduced-motion: reduce) {
      *{ transition: none !important; animation: none !important; transform: none !important; }
      canvas#particles{ display:none !important; }
      .gradient-bg { display: none !important; }
    }

    /* responsive */
    @media (max-width:900px){
      :root{ --links-width:86vw; --link-height:56px; --icon-circle:40px; --avatar-size:96px; }
    }
    @media (max-width:480px){
      :root{ --links-width:94vw; --link-height:54px; --icon-circle:36px; --avatar-size:84px; }
      .text{ font-size:15px; }
    }

  </style>
</head>

  <script>
    // Иконки lucide
    lucide.createIcons();

    // --- автоматическое поведение ссылок и тултипов ---
    const links = document.querySelectorAll('.links .link');
    links.forEach(link => {
      const href = (link.getAttribute('href') || '').trim();
      const isPlaceholder = !href || href === '#' || href.toLowerCase().startsWith('javascript:');
      if(!isPlaceholder){
        link.setAttribute('target','_blank');
        link.setAttribute('rel','noopener noreferrer');
      } else {
        // Создаем тултип для кнопок без ссылок
        if(!link.querySelector('.tooltip')){
          const tip = document.createElement('span');
          tip.className = 'tooltip';
          tip.textContent = 'Скоро... 😊';
          link.appendChild(tip);
        }

        // Обработчик клика для показа тултипа
        link.addEventListener('click', e => {
          e.preventDefault();
          const tip = link.querySelector('.tooltip');
          positionTip(tip, link);
          tip.classList.add('show');

          // Скрываем тултип через 2 секунды
          setTimeout(() => {
            tip.classList.remove('show');
          }, 2000);
        });
      }
    });

    function positionTip(tip, link){
      tip.classList.remove('left');
      const rect = link.getBoundingClientRect();
      const approxW = tip.offsetWidth || 140;

      // Проверяем, помещается ли тултип справа
      if(rect.right + 12 + approxW > window.innerWidth){
        tip.classList.add('left');
      } else {
        tip.classList.remove('left');
      }
    }

    window.addEventListener('resize', () => {
      document.querySelectorAll('.tooltip.show').forEach(tip => {
        const link = tip.closest('.link');
        positionTip(tip, link);
      });
    });

    // подставить текущий год в футер
    document.getElementById('year').textContent = new Date().getFullYear();

    /* =========================
       УЛУЧШЕННЫЕ PARTICLES С БОЛЬШИМ КОЛИЧЕСТВОМ ЧАСТИЦ
       ========================= */

    (function(){
      const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(prefersReduced) return;

      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let width = 0, height = 0, particles = [], pointer = {x: null, y: null, active: false};

      // УВЕЛИЧИЛИ КОЛИЧЕСТВО ЧАСТИЦ
      const CONFIG = {
        TYPES: [
          { count: 60, size: [1, 3], speed: 0.3, color: [120, 119, 198], alpha: [0.1, 0.3], shape: 'circle' },
          { count: 40, size: [2, 4], speed: 0.2, color: [255, 119, 198], alpha: [0.15, 0.25], shape: 'circle' },
          { count: 25, size: [1, 2], speed: 0.5, color: [120, 219, 255], alpha: [0.2, 0.4], shape: 'star' },
          { count: 20, size: [3, 6], speed: 0.1, color: [255, 219, 120], alpha: [0.05, 0.15], shape: 'circle' }
        ],
        CONNECT_DISTANCE: 120, // немного уменьшили расстояние для большего количества связей
        LINE_ALPHA: 0.1, // увеличили прозрачность линий
        REPEL_FORCE: 0.8,
        PULSE_SPEED: 0.02
      };

      function onResize(){
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', onResize, {passive:true});
      onResize();

      function rand(min, max){ return Math.random() * (max - min) + min; }

      // Создание разных типов частиц
      function createParticles(){
        particles = [];
        CONFIG.TYPES.forEach(type => {
          for(let i = 0; i < type.count; i++){
            const size = rand(type.size[0], type.size[1]);
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              r: size,
              dx: (Math.random() - 0.5) * type.speed,
              dy: (Math.random() - 0.5) * type.speed,
              alpha: rand(type.alpha[0], type.alpha[1]),
              baseAlpha: rand(type.alpha[0], type.alpha[1]),
              color: type.color,
              phase: Math.random() * Math.PI * 2,
              shape: type.shape,
              pulse: 1,
              spin: Math.random() * Math.PI * 2
            });
          }
        });
      }
      createParticles();

      // Рисование звезды
      function drawStar(ctx, x, y, radius, points, innerRadius) {
        let rot = Math.PI / 2 * 3;
        let step = Math.PI / points;

        ctx.beginPath();
        ctx.moveTo(x, y - radius);

        for (let i = 0; i < points; i++) {
          ctx.lineTo(
            x + Math.cos(rot) * radius,
            y + Math.sin(rot) * radius
          );
          rot += step;

          ctx.lineTo(
            x + Math.cos(rot) * innerRadius,
            y + Math.sin(rot) * innerRadius
          );
          rot += step;
        }

        ctx.lineTo(x, y - radius);
        ctx.closePath();
      }

      // Взаимодействие с мышью
      window.addEventListener('mousemove', e => {
        pointer.x = e.clientX;
        pointer.y = e.clientY;
        pointer.active = true;
      }, {passive:true});

      window.addEventListener('mouseout', () => {
        pointer.x = pointer.y = null;
        pointer.active = false;
      });

      // Основной рендер с улучшенной графикой
      function render(){
        ctx.clearRect(0, 0, width, height);

        // Рисуем соединения между частицами
        ctx.beginPath();
        for(let i = 0; i < particles.length; i++){
          for(let j = i + 1; j < particles.length; j++){
            const a = particles[i], b = particles[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if(distance < CONFIG.CONNECT_DISTANCE){
              const alpha = (1 - distance / CONFIG.CONNECT_DISTANCE) * CONFIG.LINE_ALPHA;
              // Цвет линии зависит от цветов соединяемых частиц
              const r = Math.round((a.color[0] + b.color[0]) / 2);
              const g = Math.round((a.color[1] + b.color[1]) / 2);
              const bVal = Math.round((a.color[2] + b.color[2]) / 2);

              ctx.strokeStyle = `rgba(${r}, ${g}, ${bVal}, ${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
            }
          }
        }
        ctx.stroke();
        ctx.closePath();

        // Рисуем частицы
        particles.forEach(p => {
          // Анимация пульсации
          p.phase += CONFIG.PULSE_SPEED;
          p.pulse = 0.8 + Math.sin(p.phase) * 0.2;
          p.alpha = p.baseAlpha * p.pulse;

          // Вращение для звезд
          if (p.shape === 'star') {
            p.spin += 0.01;
          }

          // Движение
          p.x += p.dx * p.pulse;
          p.y += p.dy * p.pulse;

          // Отскок от границ
          if(p.x < -20) p.x = width + 20;
          if(p.x > width + 20) p.x = -20;
          if(p.y < -20) p.y = height + 20;
          if(p.y > height + 20) p.y = -20;

          // Взаимодействие с курсором
          if(pointer.active && pointer.x != null){
            const mx = p.x - pointer.x;
            const my = p.y - pointer.y;
            const distance = Math.sqrt(mx * mx + my * my);
            const minDist = 80;

            if(distance < minDist && distance > 0){
              const force = (1 - distance / minDist) * CONFIG.REPEL_FORCE;
              p.x += (mx / distance) * force;
              p.y += (my / distance) * force;
            }
          }

          // Рисуем частицу в зависимости от типа
          ctx.save();
          ctx.globalAlpha = p.alpha;

          if (p.shape === 'star') {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.spin);
            ctx.fillStyle = `rgb(${p.color[0]}, ${p.color[1]}, ${p.color[2]})`;
            drawStar(ctx, 0, 0, p.r * p.pulse, 5, p.r * p.pulse * 0.5);
            ctx.fill();
          } else {
            // Добавляем свечение для кругов
            const gradient = ctx.createRadialGradient(
              p.x, p.y, 0,
              p.x, p.y, p.r * p.pulse * 2
            );
            gradient.addColorStop(0, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${p.alpha})`);
            gradient.addColorStop(1, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0)`);

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * p.pulse * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.closePath();

            // Основная частица
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * p.pulse, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${p.color[0]}, ${p.color[1]}, ${p.color[2]})`;
            ctx.fill();
            ctx.closePath();
          }

          ctx.restore();
        });

        requestAnimationFrame(render);
      }

      // Перезапуск при изменении ориентации
      window.addEventListener('orientationchange', () => {
        setTimeout(() => {
          onResize();
          createParticles();
        }, 350);
      }, {passive:true});

      // Запуск анимации
      setTimeout(() => { render(); }, 200);
    })();

  </script>
</body>
</html>
